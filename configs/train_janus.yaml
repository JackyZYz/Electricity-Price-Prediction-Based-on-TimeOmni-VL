data:
  raw_data_dir: "Dataset"
  output_dir: "data/processed"
  frequency: 96
  points_per_day: 96
  context_days: 7
  forecast_days: 1
  long_context_days: 14
  long_forecast_days: 3
  target_variable: "统一结算点电价临时结果"
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  missing_threshold: 0.5
  calendar_features: true
  selected_variables: null

model:
  backbone: "janus"
  model_path: "deepseek-ai/Janus-Pro-1B"  # or deepseek-ai/Janus-Pro-7B
  device: "auto"
  dtype: "bfloat16"

bitsi:
  image_size: 384  # Janus-Pro understands/generates 384x384 images
  alpha: 0.5
  c_mad: 0.6745
  kappa: 4.0
  color_map:
    "统一结算点电价临时结果": "#FF0000"
    "用户侧日前出清发布_出清电力": "#00FF00"
    "短期系统负荷预测信息": "#0000FF"
    "统调光电功率预测_太阳能": "#FFFF00"
    "统调风电功率预测_风力": "#00FFFF"
    "实际统调风光情况_光伏": "#FFD700"
    "实际统调风光情况_风力": "#87CEEB"
    "储能发电计划": "#FF00FF"
    "燃机固定出力总值": "#FFA500"
    "受电计划_华东": "#800080"
    "正负备用空间_正备用": "#006400"
    "正负备用空间_负备用": "#8B0000"
  max_variables: null

training:
  lr: 3e-5
  batch_size: 1
  num_epochs: 2
  warmup_ratio: 0.05
  lambda_und: 1.0
  lambda_gen: 1.0
  gradient_accumulation_steps: 4
  mixed_precision: "bf16"
  max_grad_norm: 1.0
  save_every: 1
  eval_every: 1
  lora_enabled: true
  lora_rank: 8
  lora_alpha: 16
  lora_target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]

eval:
  metrics: ["mae", "rmse", "nmape", "direction"]
  visualize: true
  num_samples: 10
